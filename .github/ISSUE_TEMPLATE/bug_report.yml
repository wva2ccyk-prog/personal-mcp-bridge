name: Bug report
description: Report incorrect or unexpected behavior in the bridge.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please reproduce against the bundled demo or
        synthetic data where possible. Do not paste private file contents or
        real tokens.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you call and what went wrong?
      placeholder: Endpoint or tool, observed response, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. `python demo/run_demo.py` is ideal.
      placeholder: |
        1. export BRIDGE_ROOTS=...
        2. curl http://127.0.0.1:8787/...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Local loopback
        - Public/tunnel mode
        - Demo
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: OS and Python version
      placeholder: e.g. Windows 11, Python 3.11
    validations:
      required: false
